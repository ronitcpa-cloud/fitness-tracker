<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חיטוב ישבן וירכיים</title>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F2F4;
    --card:#FFFFFF;
    --berry:#7C2D4E;
    --berry-deep:#5A1F38;
    --coral:#F26B5E;
    --coral-soft:#FDEAE7;
    --ink:#2B1B24;
    --muted:#8A7580;
    --line:#EBDFE5;
    --ok:#3E8E5C;
    --ok-soft:#E4F2E9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Assistant',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:60px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  /* Header */
  header{
    background:var(--berry);
    color:#fff;
    padding:22px 0 26px;
    border-radius:0 0 28px 28px;
    margin-bottom:18px;
  }
  header .wrap{display:flex;align-items:center;gap:16px}
  h1{font-family:'Suez One',serif;font-size:1.45rem;font-weight:400;line-height:1.2}
  .sub{font-size:.85rem;opacity:.85;margin-top:4px}
  .ring-box{position:relative;width:88px;height:88px;flex-shrink:0}
  .ring-box svg{transform:rotate(-90deg)}
  .ring-num{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring-num b{font-family:'Suez One',serif;font-size:1.3rem;font-weight:400}
  .ring-num span{font-size:.6rem;opacity:.8}

  /* Stats row */
  .stats{display:flex;gap:10px;margin-bottom:18px}
  .stat{
    flex:1;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:10px 8px;text-align:center;
  }
  .stat b{font-family:'Suez One',serif;font-size:1.25rem;font-weight:400;color:var(--berry);display:block}
  .stat span{font-size:.72rem;color:var(--muted)}

  /* Workout card */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:20px;margin-bottom:18px;
  }
  .w-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .w-title{font-family:'Suez One',serif;font-size:1.35rem;color:var(--berry)}
  .w-num{font-size:.8rem;color:var(--muted)}
  .phase{
    display:inline-block;background:var(--coral-soft);color:var(--coral);
    font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:14px;
  }
  .phase.base{background:#EEE6F0;color:var(--berry)}

  /* Exercise */
  .ex{
    border:1px solid var(--line);border-radius:16px;
    padding:14px;margin-bottom:12px;
  }
  .ex-top{display:flex;gap:12px;align-items:flex-start}
  .ex-fig{
    width:110px;height:78px;flex-shrink:0;background:var(--bg);
    border-radius:12px;padding:4px;
  }
  .ex-fig svg{width:100%;height:100%}
  .ex-name{font-weight:700;font-size:1rem}
  .ex-en{font-size:.72rem;color:var(--muted);margin-bottom:4px}
  .ex-count{
    display:inline-block;background:var(--berry);color:#fff;
    font-size:.78rem;font-weight:700;padding:2px 10px;border-radius:99px;
  }
  .ex-goal{
    margin-top:10px;font-size:.85rem;color:var(--ink);
    background:var(--bg);border-radius:10px;padding:8px 10px;line-height:1.4;
  }
  .ex-goal b{color:var(--berry)}

  /* Done button */
  .done-btn{
    width:100%;border:none;cursor:pointer;
    background:var(--coral);color:#fff;
    font-family:'Assistant',sans-serif;font-weight:700;font-size:1.05rem;
    padding:14px;border-radius:16px;
    transition:transform .1s, background .2s;
  }
  .done-btn:active{transform:scale(.98)}
  .rest-note{
    text-align:center;font-size:.82rem;color:var(--muted);margin-top:10px;line-height:1.5;
  }

  /* Progression note */
  .prog-note{
    background:var(--coral-soft);border-radius:14px;padding:12px 14px;
    font-size:.85rem;line-height:1.5;margin-bottom:14px;
  }
  .prog-note b{color:var(--coral)}

  /* Celebration */
  .celebrate{
    background:linear-gradient(135deg,var(--berry),var(--coral));
    color:#fff;border-radius:20px;padding:22px;text-align:center;margin-bottom:18px;
  }
  .celebrate h2{font-family:'Suez One',serif;font-weight:400;font-size:1.3rem;margin-bottom:6px}
  .celebrate p{font-size:.88rem;opacity:.92;line-height:1.5}

  /* History */
  h3.sec{
    font-family:'Suez One',serif;font-weight:400;font-size:1.05rem;
    color:var(--berry);margin:22px 0 10px;
  }
  .hist{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .h-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;border-bottom:1px solid var(--line);font-size:.88rem;
  }
  .h-row:last-child{border-bottom:none}
  .h-check{color:var(--ok);font-weight:700}
  .h-label{flex:1}
  .h-label small{color:var(--muted);display:block;font-size:.72rem}
  .h-date{
    border:1px solid var(--line);border-radius:8px;padding:3px 6px;
    font-family:'Assistant',sans-serif;font-size:.78rem;color:var(--muted);
    background:var(--bg);
  }
  .h-del{
    border:none;background:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px;
  }
  .empty{padding:18px;text-align:center;color:var(--muted);font-size:.85rem}

  .foot{
    text-align:center;font-size:.72rem;color:var(--muted);margin-top:26px;line-height:1.6;
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="ring-box">
      <svg viewBox="0 0 88 88" id="ring"></svg>
      <div class="ring-num"><b id="ringPos">1</b><span>מתוך 22</span></div>
    </div>
    <div>
      <h1>חיטוב ישבן וירכיים</h1>
      <div class="sub" id="cycleLabel">מחזור 1 · תוספת יומית לשגרת הכוח</div>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="stats">
    <div class="stat"><b id="stTotal">0</b><span>אימונים בסך הכל</span></div>
    <div class="stat"><b id="stWeek">0</b><span>אימונים השבוע (מתוך 5)</span></div>
    <div class="stat"><b id="stCycle">1</b><span>מחזור נוכחי</span></div>
  </div>

  <div id="celebrateBox"></div>
  <div id="progBox"></div>

  <div class="card" id="workoutCard"></div>

  <h3 class="sec">היסטוריית אימונים</h3>
  <div class="hist" id="histBox"></div>

  <p class="foot">
    אין תאריכים קבועים ואין ימים שהוחמצו. האימון הבא פשוט מחכה לך.<br>
    הנתונים נשמרים במכשיר הזה (localStorage).
  </p>
</div>

<script>
/* ---------- Data ---------- */
const FIGS = {
  bridge: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="112" cy="66" rx="18" ry="13" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="34" cy="96" r="10" fill="#fff"/>
    <line x1="44" y1="98" x2="112" y2="68"/>
    <line x1="112" y1="68" x2="138" y2="92"/>
    <line x1="138" y1="92" x2="140" y2="104"/>
  </svg>`,
  bridge1: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="112" cy="66" rx="18" ry="13" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="34" cy="96" r="10" fill="#fff"/>
    <line x1="44" y1="98" x2="112" y2="68"/>
    <line x1="112" y1="68" x2="138" y2="92"/>
    <line x1="138" y1="92" x2="140" y2="104"/>

  </svg>`,
  bridgeHold: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="112" cy="66" rx="18" ry="13" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="34" cy="96" r="10" fill="#fff"/>
    <line x1="44" y1="98" x2="112" y2="68"/>
    <line x1="112" y1="68" x2="138" y2="92"/>
    <line x1="138" y1="92" x2="140" y2="104"/>
    <circle cx="172" cy="30" r="16" stroke="#F26B5E" stroke-width="4" fill="#fff"/>
    <line x1="172" y1="30" x2="172" y2="20" stroke="#F26B5E" stroke-width="4"/>
    <line x1="172" y1="30" x2="180" y2="34" stroke="#F26B5E" stroke-width="4"/>
  </svg>`,
  donkey: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="120" cy="58" rx="16" ry="12" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="42" cy="46" r="10" fill="#fff"/>
    <line x1="50" y1="52" x2="118" y2="58"/>
    <line x1="60" y1="56" x2="58" y2="102"/>
    <line x1="118" y1="58" x2="126" y2="102"/>
    <line x1="120" y1="56" x2="152" y2="34"/>
    <line x1="152" y1="34" x2="152" y2="10"/>
  </svg>`,
  clam: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="108" cy="90" rx="16" ry="12" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="34" cy="80" r="10" fill="#fff"/>
    <line x1="44" y1="84" x2="108" y2="92"/>
    <line x1="108" y1="92" x2="148" y2="98"/>
    <line x1="148" y1="98" x2="120" y2="102"/>
    <line x1="108" y1="88" x2="142" y2="58"/>
    <line x1="142" y1="58" x2="116" y2="72"/>
    <path d="M150 92 A34 34 0 0 0 148 62" stroke="#F26B5E" stroke-width="3" stroke-dasharray="4 6"/>
  </svg>`,
  sideRaise: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="106" cy="88" rx="15" ry="11" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="32" cy="82" r="10" fill="#fff"/>
    <line x1="42" y1="86" x2="106" y2="92"/>
    <line x1="106" y1="92" x2="176" y2="98"/>
    <line x1="106" y1="88" x2="168" y2="46"/>
    <path d="M172 92 A44 44 0 0 0 168 52" stroke="#F26B5E" stroke-width="3" stroke-dasharray="4 6"/>
  </svg>`,
  innerLift: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="118" cy="86" rx="14" ry="11" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="34" cy="80" r="10" fill="#fff"/>
    <line x1="44" y1="84" x2="110" y2="90"/>
    <line x1="110" y1="86" x2="140" y2="60"/>
    <line x1="140" y1="60" x2="118" y2="56"/>
    <line x1="110" y1="92" x2="176" y2="78"/>
    <path d="M178 96 A26 26 0 0 0 178 72" stroke="#F26B5E" stroke-width="3" stroke-dasharray="4 6"/>
  </svg>`,
  revLunge: `<svg viewBox="0 0 200 120" fill="none" stroke="#2B1B24" stroke-width="6" stroke-linecap="round">
    <line x1="10" y1="106" x2="190" y2="106" stroke="#EBDFE5" stroke-width="4"/>
    <ellipse cx="96" cy="66" rx="13" ry="12" fill="#F26B5E" opacity=".35" stroke="none"/>
    <circle cx="92" cy="20" r="10" fill="#fff"/>
    <line x1="93" y1="30" x2="96" y2="64"/>
    <line x1="96" y1="64" x2="72" y2="82"/>
    <line x1="72" y1="82" x2="74" y2="104"/>
    <line x1="96" y1="64" x2="128" y2="80"/>
    <line x1="128" y1="80" x2="146" y2="102"/>
    <path d="M138 60 L156 48" stroke="#F26B5E" stroke-width="3" stroke-dasharray="4 6"/>
  </svg>`
};

const EX = {
  bridge:{name:'גשר ישבן', en:'Glute Bridge', fig:'bridge', count:'3x20',
    goal:'<b>המטרה:</b> חיזוק שריר הישבן הגדול (גלוטאוס מקסימוס) ומייצבי הליבה. הבסיס של כל התוכנית.'},
  bridge1:{name:'גשר ישבן על רגל אחת', en:'Single Leg Glute Bridge', fig:'bridge1', count:'3x12 לכל רגל',
    goal:'<b>המטרה:</b> עומס כפול על צד אחד. מתקן חוסר איזון בין הרגליים ומעמיק את העבודה על הישבן.'},
  donkeyA:{name:'הרמת רגל לאחור בעמידת שש', en:'Donkey Kick', fig:'donkey', count:'3x15 לכל רגל',
    goal:'<b>המטרה:</b> בידוד שריר הישבן הגדול, בלי עומס על הגב התחתון. לדחוף עם העקב כלפי מעלה.'},
  clam:{name:'צדפה', en:'Clamshell', fig:'clam', count:'3x20 לכל צד',
    goal:'<b>המטרה:</b> הישבן הצדדי (גלוטאוס מדיוס). מייצב את האגן והברכיים ומעצב את קו הירך העליון.'},
  sideRaise:{name:'הרמת רגל הצידה בשכיבה', en:'Side Lying Leg Raise', fig:'sideRaise', count:'3x15 לכל צד',
    goal:'<b>המטרה:</b> ירך חיצונית וישבן צדדי. עיצוב וחיטוב של קו הירך מבחוץ.'},
  innerLift:{name:'הרמת הרגל הפנימית', en:'Inner Thigh Lift', fig:'innerLift', count:'3x12 לכל צד',
    goal:'<b>המטרה:</b> שרירי המקרבים (ירך פנימית). האזור שרוב התרגילים מפספסים.'},
  revLunge:{name:'מכרע לאחור', en:'Reverse Lunge', fig:'revLunge', count:'3x10 לכל רגל',
    goal:'<b>המטרה:</b> תרגיל מורכב לישבן ולירך הקדמית + שיווי משקל. עדין לברכיים יותר ממכרע קדמי.'},
  donkeyC:{name:'בעיטה לאחור בעמידת שש', en:'Donkey Kick', fig:'donkey', count:'3x15 לכל רגל',
    goal:'<b>המטרה:</b> בידוד הישבן בסוף האימון, כשהשריר כבר עייף. כאן קורה החיטוב.'},
  bridgeHold:{name:'גשר ישבן עם החזקה 10 שניות', en:'Glute Bridge Hold', fig:'bridgeHold', count:'3x8',
    goal:'<b>המטרה:</b> עבודה איזומטרית. סיבולת השריר וכיווץ מקסימלי בנקודת השיא.'}
};

const WORKOUTS = {
  'א':{title:'אימון א · ישבן', ex:['bridge','bridge1','donkeyA']},
  'ב':{title:'אימון ב · ירכיים', ex:['clam','sideRaise','innerLift']},
  'ג':{title:'אימון ג · משולב', ex:['revLunge','donkeyC','bridgeHold']}
};
const ROTATION = ['א','ב','ג'];
const CYCLE_LEN = 22;

/* ---------- State ---------- */
const KEY = 'glutesTracker';
let mem = {done: []};
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) mem = JSON.parse(raw);
    if(!Array.isArray(mem.done)) mem = {done: []};
  }catch(e){ /* fallback: in-memory only */ }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(mem)); }catch(e){}
}

/* ---------- Helpers ---------- */
const todayISO = () => new Date().toISOString().slice(0,10);
function typeOf(n){ return ROTATION[(n-1)%3]; }
function cycleOf(n){ return Math.floor((n-1)/CYCLE_LEN)+1; }
function posOf(n){ return ((n-1)%CYCLE_LEN)+1; }
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y.slice(2)}`;
}

/* ---------- Render ---------- */
function render(){
  const total = mem.done.length;
  const next = total + 1;
  const type = typeOf(next);
  const cyc = cycleOf(next);
  const pos = posOf(next);
  const overload = pos >= 12;

  // ring: 22 segments
  const ring = document.getElementById('ring');
  let segs = '';
  const cx=44, cy=44, r=38;
  for(let i=0;i<CYCLE_LEN;i++){
    const a0 = (i/CYCLE_LEN)*2*Math.PI + 0.03;
    const a1 = ((i+1)/CYCLE_LEN)*2*Math.PI - 0.03;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const filled = i < pos-1;
    segs += `<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}"
      stroke="${filled?'#F26B5E':'rgba(255,255,255,.28)'}" stroke-width="7" fill="none" stroke-linecap="round"/>`;
  }
  ring.innerHTML = segs;
  document.getElementById('ringPos').textContent = pos;

  document.getElementById('cycleLabel').textContent =
    `מחזור ${cyc} · תוספת יומית לשגרת הכוח`;

  // stats
  document.getElementById('stTotal').textContent = total;
  document.getElementById('stCycle').textContent = cyc;
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-6);
  const weekCount = mem.done.filter(d => d.date >= weekAgo.toISOString().slice(0,10)).length;
  document.getElementById('stWeek').textContent = weekCount;

  // celebration when a cycle was just completed
  const cel = document.getElementById('celebrateBox');
  if(total > 0 && total % CYCLE_LEN === 0){
    cel.innerHTML = `<div class="celebrate">
      <h2>מחזור ${total/CYCLE_LEN} הושלם! 🎉</h2>
      <p>22 אימונים מאחורייך. מחזור ${cyc} מתחיל עכשיו עם רמת העמסה חדשה.</p>
    </div>`;
  } else cel.innerHTML = '';

  // progression note
  const prog = document.getElementById('progBox');
  let progHtml = '';
  if(cyc === 1 && overload){
    progHtml = `<div class="prog-note"><b>שלב העמסה:</b> מהאימון הזה, ירידה איטית של 3 שניות בכל חזרה, או תוספת של 5 חזרות לסט.</div>`;
  } else if(cyc === 2){
    progHtml = `<div class="prog-note"><b>מחזור 2:</b> שומרים על הירידה האיטית, ומוסיפים החזקה של 2 שניות בנקודת השיא של כל חזרה.</div>`;
  } else if(cyc >= 3){
    progHtml = `<div class="prog-note"><b>מחזור ${cyc}:</b> הגוף כבר הסתגל למשקל גוף. שקלי להחזיר גומייה או משקולת לתרגילים, זו הדרך להמשיך להתקדם.</div>`;
  }
  prog.innerHTML = progHtml;

  // workout card
  const w = WORKOUTS[type];
  let exHtml = w.ex.map(k=>{
    const e = EX[k];
    return `<div class="ex">
      <div class="ex-top">
        <div class="ex-fig">${FIGS[e.fig]}</div>
        <div>
          <div class="ex-name">${e.name}</div>
          <div class="ex-en">${e.en}</div>
          <span class="ex-count">${e.count}</span>
        </div>
      </div>
      <div class="ex-goal">${e.goal}</div>
    </div>`;
  }).join('');

  document.getElementById('workoutCard').innerHTML = `
    <div class="w-head">
      <span class="w-title">${w.title}</span>
      <span class="w-num">אימון #${next}</span>
    </div>
    <span class="phase ${overload?'':'base'}">${overload?'שלב העמסה (12-22)':'שלב בסיס (1-11)'} · מחזור ${cyc}</span>
    ${exHtml}
    <button class="done-btn" onclick="markDone()">סיימתי את האימון ✓</button>
    <p class="rest-note">בערך 10 דקות, אחרי בלוק הכוח הרגיל שלך.<br>שישי ושבת מנוחה, וגם כל יום אחר שתבחרי. הרצף לא נשבר.</p>
  `;

  // history
  const hist = document.getElementById('histBox');
  if(total === 0){
    hist.innerHTML = `<div class="empty">עוד לא סומן אימון. האימון הראשון מחכה למעלה.</div>`;
  } else {
    hist.innerHTML = mem.done.slice().reverse().map((d,ri)=>{
      const i = total - 1 - ri;
      return `<div class="h-row">
        <span class="h-check">✓</span>
        <span class="h-label">אימון #${d.n} · אימון ${d.type}
          <small>מחזור ${cycleOf(d.n)} · ${posOf(d.n)}/22</small>
        </span>
        <input type="date" class="h-date" value="${d.date}" onchange="editDate(${i}, this.value)" aria-label="תאריך ביצוע">
        ${i === total-1 ? `<button class="h-del" onclick="undoLast()" title="ביטול הסימון האחרון">✕</button>` : ''}
      </div>`;
    }).join('');
  }
}

/* ---------- Actions ---------- */
function markDone(){
  const n = mem.done.length + 1;
  mem.done.push({n, type: typeOf(n), date: todayISO()});
  save(); render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function editDate(i, val){
  if(mem.done[i] && val){ mem.done[i].date = val; save(); render(); }
}
function undoLast(){
  if(mem.done.length && confirm('לבטל את סימון האימון האחרון?')){
    mem.done.pop(); save(); render();
  }
}

load(); render();
</script>
</body>
</html>
