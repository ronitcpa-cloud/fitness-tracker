<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רונית · חיטוב ישבן וירכיים</title>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#1C0E24;
    --bg2:#3A1240;
    --card:#2A1631;
    --card-hi:rgba(255,255,255,.07);
    --pink:#FF3E8A;
    --pink-deep:#B01858;
    --orange:#FF7A45;
    --violet:#9D4EDD;
    --aqua:#2EE6C8;
    --ink:#F7ECF4;
    --muted:#C9A8C4;
    --line:rgba(255,255,255,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Assistant',sans-serif;
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 55%,#241035 100%) fixed;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:60px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  /* Header */
  header{
    background:linear-gradient(135deg,var(--pink) 0%,var(--orange) 100%);
    color:#fff;
    padding:24px 0 28px;
    border-radius:0 0 30px 30px;
    margin-bottom:20px;
    box-shadow:0 14px 34px rgba(255,62,138,.4), inset 0 2px 0 rgba(255,255,255,.35);
  }
  header .wrap{display:flex;align-items:center;gap:14px}
  header .wrap > div:nth-child(2){flex:1}
  h1{
    font-family:'Suez One',serif;font-size:1.5rem;font-weight:400;line-height:1.2;
    text-shadow:0 2px 6px rgba(0,0,0,.28);
  }
  .sub{font-size:.85rem;opacity:.95;margin-top:4px}
  .ring-box{
    position:relative;width:92px;height:92px;flex-shrink:0;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));
  }
  .ring-box svg{transform:rotate(-90deg)}
  .ring-num{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring-num b{font-family:'Suez One',serif;font-size:1.4rem;font-weight:400;text-shadow:0 2px 4px rgba(0,0,0,.3)}
  .ring-num span{font-size:.6rem;opacity:.9}
  .avatar{
    width:58px;height:58px;border-radius:50%;flex-shrink:0;
    border:3px solid rgba(255,255,255,.85);
    box-shadow:0 4px 14px rgba(0,0,0,.35), 0 0 0 3px rgba(255,255,255,.2);
    object-fit:cover;
  }
  .greet{font-size:.95rem;font-weight:800;margin-bottom:2px;text-shadow:0 1px 3px rgba(0,0,0,.25)}

  /* Stats */
  .stats{display:flex;gap:10px;margin-bottom:20px}
  .stat{
    flex:1;border-radius:18px;padding:12px 8px;text-align:center;
    background:linear-gradient(180deg,var(--card-hi),transparent),var(--card);
    border:1px solid var(--line);
    box-shadow:0 8px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .stat b{
    font-family:'Suez One',serif;font-size:1.4rem;font-weight:400;display:block;
    background:linear-gradient(90deg,var(--pink),var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat span{font-size:.72rem;color:var(--muted)}

  /* Workout card */
  .card{
    background:linear-gradient(180deg,var(--card-hi),transparent),var(--card);
    border:1px solid var(--line);
    border-radius:22px;padding:20px;margin-bottom:18px;
    box-shadow:0 14px 34px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .w-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .w-title{
    font-family:'Suez One',serif;font-size:1.4rem;
    background:linear-gradient(90deg,var(--pink),var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .w-num{font-size:.8rem;color:var(--muted)}
  .phase{
    display:inline-block;font-size:.75rem;font-weight:800;
    padding:4px 12px;border-radius:99px;margin-bottom:14px;color:#fff;
    background:linear-gradient(90deg,var(--violet),var(--pink));
    box-shadow:0 4px 12px rgba(157,78,221,.45);
  }
  .phase.base{background:linear-gradient(90deg,#2A9DF4,var(--violet));box-shadow:0 4px 12px rgba(42,157,244,.4)}

  /* Exercise */
  .ex{
    border:1px solid var(--line);border-radius:18px;
    padding:14px;margin-bottom:14px;
    background:rgba(0,0,0,.22);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  }
  .ex-top{display:flex;gap:12px;align-items:flex-start}
  .ex-fig{
    width:112px;height:80px;flex-shrink:0;border-radius:14px;padding:4px;
    background:linear-gradient(145deg,#3B1A44,#241030);
    border:1px solid var(--line);
    box-shadow:inset 0 2px 8px rgba(0,0,0,.5);
  }
  .ex-fig svg{width:100%;height:100%}
  .ex-name{font-weight:800;font-size:1.02rem}
  .ex-en{font-size:.72rem;color:var(--muted);margin-bottom:6px}
  .ex-count{
    display:inline-block;color:#fff;
    font-size:.78rem;font-weight:800;padding:3px 12px;border-radius:99px;
    background:linear-gradient(90deg,var(--pink),var(--orange));
    box-shadow:0 4px 10px rgba(255,62,138,.4), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .ex-goal{
    margin-top:10px;font-size:.85rem;line-height:1.45;
    background:rgba(46,230,200,.08);
    border-right:3px solid var(--aqua);
    border-radius:10px;padding:8px 12px;
  }
  .ex-goal b{color:var(--aqua)}

  /* How-to (collapsible) */
  details.how{margin-top:10px}
  details.how summary{
    list-style:none;cursor:pointer;user-select:none;
    display:flex;align-items:center;gap:8px;
    font-size:.85rem;font-weight:800;color:#fff;
    background:linear-gradient(90deg,var(--violet),#7A2EBB);
    border-radius:12px;padding:9px 14px;
    box-shadow:0 4px 0 #4E1A78, 0 8px 18px rgba(157,78,221,.35);
    transition:transform .08s, box-shadow .08s;
  }
  details.how summary::-webkit-details-marker{display:none}
  details.how summary:active{transform:translateY(3px);box-shadow:0 1px 0 #4E1A78}
  details.how summary::after{content:'▾';margin-inline-start:auto;transition:transform .2s}
  details.how[open] summary::after{transform:rotate(180deg)}
  .how-body{
    margin-top:10px;border-radius:12px;padding:12px 14px;font-size:.85rem;line-height:1.55;
    background:rgba(157,78,221,.1);border:1px solid rgba(157,78,221,.3);
  }
  .how-body h4{
    font-size:.8rem;margin-bottom:4px;
    color:var(--orange);letter-spacing:.02em;
  }
  .how-body h4.cues{color:var(--pink);margin-top:10px}
  .how-body ol{padding-inline-start:18px}
  .how-body ul{padding-inline-start:18px;list-style:none}
  .how-body ul li::before{content:'⚠ ';color:var(--pink)}
  .how-body li{margin-bottom:3px}

  /* Done button — 3D */
  .done-btn{
    width:100%;border:none;cursor:pointer;
    background:linear-gradient(180deg,#FF5C9E 0%,var(--pink) 45%,#E32873 100%);
    color:#fff;
    font-family:'Assistant',sans-serif;font-weight:800;font-size:1.1rem;
    padding:15px;border-radius:18px;
    box-shadow:0 7px 0 var(--pink-deep), 0 14px 26px rgba(255,62,138,.45), inset 0 2px 0 rgba(255,255,255,.35);
    transition:transform .08s, box-shadow .08s;
    text-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .done-btn:active{
    transform:translateY(5px);
    box-shadow:0 2px 0 var(--pink-deep), 0 6px 14px rgba(255,62,138,.35), inset 0 2px 0 rgba(255,255,255,.25);
  }
  .rest-note{text-align:center;font-size:.82rem;color:var(--muted);margin-top:12px;line-height:1.5}

  /* Progression note */
  .prog-note{
    border-radius:16px;padding:12px 16px;font-size:.87rem;line-height:1.5;margin-bottom:16px;
    background:linear-gradient(90deg,rgba(255,122,69,.18),rgba(255,62,138,.14));
    border:1px solid rgba(255,122,69,.4);
    box-shadow:0 6px 16px rgba(0,0,0,.3);
  }
  .prog-note b{color:var(--orange)}

  /* Celebration */
  .celebrate{
    background:linear-gradient(135deg,var(--violet),var(--pink),var(--orange));
    color:#fff;border-radius:22px;padding:24px;text-align:center;margin-bottom:18px;
    box-shadow:0 14px 34px rgba(255,62,138,.5), inset 0 2px 0 rgba(255,255,255,.35);
  }
  .celebrate h2{font-family:'Suez One',serif;font-weight:400;font-size:1.35rem;margin-bottom:6px;text-shadow:0 2px 6px rgba(0,0,0,.3)}
  .celebrate p{font-size:.9rem;opacity:.95;line-height:1.5}

  /* History */
  h3.sec{
    font-family:'Suez One',serif;font-weight:400;font-size:1.1rem;margin:24px 0 10px;
    background:linear-gradient(90deg,var(--pink),var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hist{
    background:linear-gradient(180deg,var(--card-hi),transparent),var(--card);
    border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:0 10px 26px rgba(0,0,0,.4);
  }
  .h-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;border-bottom:1px solid var(--line);font-size:.88rem;
  }
  .h-row:last-child{border-bottom:none}
  .h-check{color:var(--aqua);font-weight:800;text-shadow:0 0 10px rgba(46,230,200,.6)}
  .h-label{flex:1}
  .h-label small{color:var(--muted);display:block;font-size:.72rem}
  .h-date{
    border:1px solid var(--line);border-radius:8px;padding:3px 6px;
    font-family:'Assistant',sans-serif;font-size:.78rem;color:var(--ink);
    background:rgba(0,0,0,.3);
    color-scheme:dark;
  }
  .h-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px}
  .empty{padding:18px;text-align:center;color:var(--muted);font-size:.85rem}

  .foot{text-align:center;font-size:.72rem;color:var(--muted);margin-top:26px;line-height:1.6}
  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>

    how:['שכיבה על הגב, ברכיים כפופות, כפות רגליים על הרצפה ברוחב האגן, קרוב לישבן.',

    how:['שכיבה על הצד, גוף בקו ישר, ברכיים כפופות בזווית של כ-45 מעלות.',

    cues:['האגן ניצב ויציב, לא מתגלגל אחורה כשפותחים את הברך.',
          'העקבים לא נפרדים, רק הברך זזה.',
          'תנועה איטית ומבוקרת, בלי תנופה. אם לא שורף בישבן הצדדי, מאיטים עוד.']},
  sideRaise:{name:'הרמת רגל הצידה בשכיבה', en:'Side Lying Leg Raise', fig:'sideRaise', count:'3x15 לכל צד',
    goal:'<b>המטרה:</b> ירך חיצונית וישבן צדדי. עיצוב וחיטוב של קו הירך מבחוץ.',
    how:['שכיבה על הצד, הגוף בקו ישר אחד מהראש עד העקבים.',
         'הרגל העליונה ישרה ומתוחה, אצבעות הרגל פונות קדימה.',
         'הרמת הרגל לגובה של כ-45 מעלות וירידה איטית בלי להניח אותה.'],
    cues:['רגל ישרה לחלוטין, בלי כיפוף בברך.',
          'אצבעות הרגל קדימה ולא לתקרה, אחרת העומס בורח מהישבן הצדדי.',
          'לא להישען על היד הקדמית לתנופה, הגו יציב והתנועה רק מהרגל.',
          'לא להרים גבוה מדי, מעל 45 מעלות האגן מתחיל לזוז.']},
  innerLift:{name:'הרמת הרגל הפנימית', en:'Inner Thigh Lift', fig:'innerLift', count:'3x12 לכל צד',
    goal:'<b>המטרה:</b> שרירי המקרבים (ירך פנימית). האזור שרוב התרגילים מפספסים.',
    how:['שכיבה על הצד. הרגל העליונה מקופלת קדימה, כף הרגל מונחת על הרצפה לפני הגוף.',
         'הרגל התחתונה ישרה ומתוחה.',
         'הרמת הרגל התחתונה מהרצפה כמה שאפשר, החזקה של שנייה, וירידה איטית.'],
    cues:['הרגל התחתונה נשארת ישרה ומתוחה כל הזמן.',
          'התנועה קטנה, גם 15-20 סנטימטר זה מצוין. איכות לפני גובה.',
          'הגו לא מתגלגל אחורה, הליבה אסופה.']},
  revLunge:{name:'מכרע לאחור', en:'Reverse Lunge', fig:'revLunge', count:'3x10 לכל רגל',
    goal:'<b>המטרה:</b> תרגיל מורכב לישבן ולירך הקדמית + שיווי משקל. עדין לברכיים יותר ממכרע קדמי.',
    how:['עמידה זקופה, רגליים ברוחב האגן, ידיים על המותניים.',
         'צעד גדול לאחור עם רגל אחת, וירידה עד ששתי הברכיים בזווית של כ-90 מעלות.',
         'הברך האחורית יורדת לכיוון הרצפה בלי לגעת בה.',
         'עלייה בדחיפה דרך עקב הרגל הקדמית, וחזרה לעמידה.'],
    cues:['גו זקוף לאורך כל התנועה, לא נשענים קדימה.',
          'הברך הקדמית נשארת מעל הקרסול, לא עוברת את קו הבהונות.',
          'המשקל על עקב הרגל הקדמית, שם עובד הישבן.',
          'אם שיווי המשקל קשה, אפשר להחזיק ביד אחת בקיר או בכיסא.']},
  donkeyC:{name:'בעיטה לאחור בעמידת שש', en:'Donkey Kick', fig:'donkey', count:'3x15 לכל רגל',
    goal:'<b>המטרה:</b> בידוד הישבן בסוף האימון, כשהשריר כבר עייף. כאן קורה החיטוב.',
    how:['עמידת שש: כפות ידיים מתחת לכתפיים, ברכיים מתחת לאגן.',
         'הרמת רגל כפופה 90 מעלות לאחור, העקב דוחף לתקרה.',
         'כיווץ ישבן בנקודה העליונה, וירידה איטית בלי לגעת ברצפה.'],
    cues:['גב ישר, בטן אסופה, בלי קשת בגב התחתון.',
          'האגן לא מסתובב, נשאר מקביל לרצפה.',
          'התנועה איטית, בסוף האימון הפיתוי לתנופה גדול, לא להתפתות.']},
  bridgeHold:{name:'גשר ישבן עם החזקה 10 שניות', en:'Glute Bridge Hold', fig:'bridgeHold', count:'3x8',
    goal:'<b>המטרה:</b> עבודה איזומטרית. סיבולת השריר וכיווץ מקסימלי בנקודת השיא.',
    how:['תנוחת גשר רגילה: שכיבה על הגב, ברכיים כפופות, עקבים קרובים לישבן.',
         'הרמת האגן לקו ישר כתפיים-ברכיים.',
         'החזקה למעלה 10 שניות בכיווץ ישבן מלא, ואז ירידה איטית.'],
    cues:['לנשום רגיל בזמן ההחזקה, לא לעצור את הנשימה.',
          'האגן לא צונח באמצע ההחזקה, אם הוא יורד מסיימים את החזרה.',
          'הישבן מכווץ בכוח כל 10 השניות, לא רק מחזיקים את הגובה.']}
};

const WORKOUTS = {
  'א':{title:'אימון א · ישבן', ex:['bridge','bridge1','donkeyA']},
  'ב':{title:'אימון ב · ירכיים', ex:['clam','sideRaise','innerLift']},
  'ג':{title:'אימון ג · משולב', ex:['revLunge','donkeyC','bridgeHold']}
};
const ROTATION = ['א','ב','ג'];
const CYCLE_LEN = 22;

/* ---------- State ---------- */
const KEY = 'glutesTracker';
let mem = {done: []};
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) mem = JSON.parse(raw);
    if(!Array.isArray(mem.done)) mem = {done: []};
  }catch(e){ /* fallback: in-memory only */ }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(mem)); }catch(e){}
}

/* ---------- Helpers ---------- */
const todayISO = () => new Date().toISOString().slice(0,10);
function typeOf(n){ return ROTATION[(n-1)%3]; }
function cycleOf(n){ return Math.floor((n-1)/CYCLE_LEN)+1; }
function posOf(n){ return ((n-1)%CYCLE_LEN)+1; }

/* ---------- Render ---------- */
function render(){
  const total = mem.done.length;
  const next = total + 1;
  const type = typeOf(next);
  const cyc = cycleOf(next);
  const pos = posOf(next);
  const overload = pos >= 12;

  // ring: 22 segments
  const ring = document.getElementById('ring');
  let segs = '';
  const cx=46, cy=46, r=39;
  for(let i=0;i<CYCLE_LEN;i++){
    const a0 = (i/CYCLE_LEN)*2*Math.PI + 0.03;
    const a1 = ((i+1)/CYCLE_LEN)*2*Math.PI - 0.03;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const filled = i < pos-1;
    segs += `<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}"
      stroke="${filled?'#FFFFFF':'rgba(255,255,255,.3)'}" stroke-width="7" fill="none" stroke-linecap="round"/>`;
  }
  ring.innerHTML = segs;
  document.getElementById('ringPos').textContent = pos;

  document.getElementById('cycleLabel').textContent =
    `מחזור ${cyc} · תוספת יומית לשגרת הכוח`;

  document.getElementById('stTotal').textContent = total;
  document.getElementById('stCycle').textContent = cyc;
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-6);
  const weekCount = mem.done.filter(d => d.date >= weekAgo.toISOString().slice(0,10)).length;
  document.getElementById('stWeek').textContent = weekCount;

  const cel = document.getElementById('celebrateBox');
  if(total > 0 && total % CYCLE_LEN === 0){
    cel.innerHTML = `<div class="celebrate">
      <h2>מחזור ${total/CYCLE_LEN} הושלם! 🎉</h2>
      <p>22 אימונים מאחורייך. מחזור ${cyc} מתחיל עכשיו עם רמת העמסה חדשה.</p>
    </div>`;
  } else cel.innerHTML = '';

  const prog = document.getElementById('progBox');
  let progHtml = '';
  if(cyc === 1 && overload){
    progHtml = `<div class="prog-note"><b>שלב העמסה:</b> מהאימון הזה, ירידה איטית של 3 שניות בכל חזרה, או תוספת של 5 חזרות לסט.</div>`;
  } else if(cyc === 2){
    progHtml = `<div class="prog-note"><b>מחזור 2:</b> שומרים על הירידה האיטית, ומוסיפים החזקה של 2 שניות בנקודת השיא של כל חזרה.</div>`;
  } else if(cyc >= 3){
    progHtml = `<div class="prog-note"><b>מחזור ${cyc}:</b> הגוף כבר הסתגל למשקל גוף. שקלי להחזיר גומייה או משקולת לתרגילים, זו הדרך להמשיך להתקדם.</div>`;
  }
  prog.innerHTML = progHtml;

  const w = WORKOUTS[type];
  let exHtml = w.ex.map(k=>{
    const e = EX[k];
    const steps = e.how.map(s=>`<li>${s}</li>`).join('');
    const cues = e.cues.map(c=>`<li>${c}</li>`).join('');
    return `<div class="ex">
      <div class="ex-top">
        <div class="ex-fig">${FIGS[e.fig]}</div>
        <div>
          <div class="ex-name">${e.name}</div>
          <div class="ex-en">${e.en}</div>
          <span class="ex-count">${e.count}</span>
        </div>
      </div>
      <div class="ex-goal">${e.goal}</div>
      <details class="how">
        <summary>איך מבצעים + דגשים</summary>
        <div class="how-body">
          <h4>שלבי הביצוע</h4>
          <ol>${steps}</ol>
          <h4 class="cues">חשוב להקפיד</h4>
          <ul>${cues}</ul>
        </div>
      </details>
    </div>`;
  }).join('');

  document.getElementById('workoutCard').innerHTML = `
    <div class="w-head">
      <span class="w-title">${w.title}</span>
      <span class="w-num">אימון #${next}</span>
    </div>
    <span class="phase ${overload?'':'base'}">${overload?'שלב העמסה (12-22)':'שלב בסיס (1-11)'} · מחזור ${cyc}</span>
    ${exHtml}
    <button class="done-btn" onclick="markDone()">סיימתי את האימון ✓</button>
    <p class="rest-note">בערך 10 דקות, אחרי בלוק הכוח הרגיל שלך.<br>שישי ושבת מנוחה, וגם כל יום אחר שתבחרי. הרצף לא נשבר.</p>
  `;

  const hist = document.getElementById('histBox');
  if(total === 0){
    hist.innerHTML = `<div class="empty">רונית, עוד לא סומן אימון. הראשון מחכה לך למעלה.</div>`;
  } else {
    hist.innerHTML = mem.done.slice().reverse().map((d,ri)=>{
      const i = total - 1 - ri;
      return `<div class="h-row">
        <span class="h-check">✓</span>
        <span class="h-label">אימון #${d.n} · אימון ${d.type}
          <small>מחזור ${cycleOf(d.n)} · ${posOf(d.n)}/22</small>
        </span>
        <input type="date" class="h-date" value="${d.date}" onchange="editDate(${i}, this.value)" aria-label="תאריך ביצוע">
        ${i === total-1 ? `<button class="h-del" onclick="undoLast()" title="ביטול הסימון האחרון">✕</button>` : ''}
      </div>`;
    }).join('');
  }
}

/* ---------- Actions ---------- */
function markDone(){
  const n = mem.done.length + 1;
  mem.done.push({n, type: typeOf(n), date: todayISO()});
  save(); render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function editDate(i, val){
  if(mem.done[i] && val){ mem.done[i].date = val; save(); render(); }
}
function undoLast(){
  if(mem.done.length && confirm('לבטל את סימון האימון האחרון?')){
    mem.done.pop(); save(); render();
  }
}

load(); render();
</script>
</body>
</html>
